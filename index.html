<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JG Asset Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <script>
        // 🔗 YOUR DEPLOYED GOOGLE API URL
        const GOOGLE_API_URL = "https://script.google.com/a/macros/jayagrocer.com/s/AKfycbxzY_r1hKDCbSU2J03r2A2xPV9TNn7D7xL1QxK7a3l9jM_a3q2Y/exec";

        const profiles = {
            "Sunmi V3": ["Barcode", "IMEI 1", "IMEI 2", "Serial Number", "SID"],
            "Android Phone": ["Barcode", "IMEI 1", "Serial Number"],
            "Newland Scanner": ["Barcode", "Serial Number"]
        };

        let currentProfileFields = [];
        let currentDevicePayload = {};
        let sessionSuccessCount = 0;

        function initiateWorkflow(profileName) {
            if (!profileName) return;
            currentProfileFields = profiles[profileName];
            currentDevicePayload = { "Model": profileName };

            buildDynamicFormFields();
            document.getElementById("workflow-card").classList.remove("hidden");
            document.getElementById("recent-scans-box").classList.remove("hidden");

            // Auto focus the very first text box instantly
            setTimeout(() => focusFieldByIndex(0), 300);
        }

        function buildDynamicFormFields() {
            const container = document.getElementById("dynamic-fields-container");
            container.innerHTML = "";

            currentProfileFields.forEach((field, idx) => {
                container.innerHTML += `
          <div class="text-left space-y-1">
            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">${idx + 1}. ${field}</label>
            <input type="text" 
                   id="input-${idx}" 
                   data-field="${field}" 
                   data-index="${idx}"
                   placeholder="Tap to scan or type ${field}..." 
                   class="w-full p-3.5 bg-gray-50 border-2 border-gray-200 rounded-xl font-mono text-sm outline-none focus:border-emerald-500 focus:bg-white focus:ring-4 focus:ring-emerald-500/10 transition"
                   autocomplete="off">
          </div>
        `;
            });

            // Bind dynamic Keydown event listeners to every generated element input block
            currentProfileFields.forEach((_, idx) => {
                document.getElementById(`input-${idx}`).addEventListener("keydown", handleInputKeydown);
            });
        }

        function handleInputKeydown(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                const value = e.target.value.trim();
                const currentIdx = parseInt(e.target.dataset.index, 10);
                const fieldName = e.target.dataset.field;

                if (value === "") return;

                // Save entry into data structure payload matrix
                currentDevicePayload[fieldName] = value;

                // Visual confirmation change style to green wrapper
                e.target.classList.remove("border-gray-200", "focus:border-emerald-500");
                e.target.classList.add("border-emerald-500", "bg-emerald-50/30", "text-emerald-700", "font-bold");

                // Soft vibration response check
                if (navigator.vibrate) navigator.vibrate(50);

                // Move execution focus pointer forward to next text field index row item
                const nextIdx = currentIdx + 1;
                if (nextIdx < currentProfileFields.length) {
                    focusFieldByIndex(nextIdx);
                } else {
                    // All configurations packed! Finalize write transaction sequence
                    submitToGoogleSheets();
                }
            }
        }

        function focusFieldByIndex(index) {
            const targetInput = document.getElementById(`input-${index}`);
            if (targetInput) {
                targetInput.focus();
                targetInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        async function submitToGoogleSheets() {
            document.getElementById("status-text").textContent = "Saving to Google Sheets...";
            setFormInputsDisabled(true);

            try {
                const response = await fetch(GOOGLE_API_URL, {
                    method: "POST",
                    body: JSON.stringify(currentDevicePayload)
                });
                const result = await response.json();

                if (result.success) {
                    sessionSuccessCount++;
                    document.getElementById("progress-text").textContent = `${sessionSuccessCount} Devices`;

                    const log = document.getElementById("history-list");
                    log.innerHTML = `<div class="py-2 text-gray-600 flex justify-between font-mono text-xs border-b border-gray-50"><span>✅ <b>${result.assetId}</b> [${currentDevicePayload["Model"]}]</span></div>` + log.innerHTML;

                    // Flash page clean loop parameters immediately for subsequent box tags
                    document.getElementById("status-text").textContent = "Saved Successfully!";
                    setTimeout(() => {
                        initiateWorkflow(document.getElementById("profile-selector").value);
                        document.getElementById("status-text").textContent = "Ready for Next Box";
                    }, 1000);
                } else {
                    alert(result.message);
                    setFormInputsDisabled(false);
                }
            } catch (err) {
                alert("Spreadsheet Connection Timeout Error.");
                setFormInputsDisabled(false);
            }
        }

        function setFormInputsDisabled(disabled) {
            currentProfileFields.forEach((_, idx) => {
                const input = document.getElementById(`input-${idx}`);
                if (input) input.disabled = disabled;
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("profile-selector").addEventListener("change", (e) => initiateWorkflow(e.target.value));
            document.getElementById("btn-reset").addEventListener("click", () => initiateWorkflow(document.getElementById("profile-selector").value));
        });
    </script>

    <nav class="bg-emerald-600 text-white shadow-md p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg">JG Asset Manager</h1>
            <span class="text-xs bg-emerald-700 px-2 py-1 rounded">v5.0 - Rapid Ingest</span>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <div class="bg-white p-5 rounded-2xl shadow-xs border border-gray-100">
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Select Device
                Profile</label>
            <select id="profile-selector"
                class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                <option value="" disabled selected>— Choose Profile —</option>
                <option value="Sunmi V3">Sunmi V3</option>
                <option value="Android Phone">Android Phone</option>
                <option value="Newland Scanner">Newland Scanner</option>
            </select>
        </div>

        <div id="workflow-card"
            class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 hidden text-center space-y-5">
            <div class="flex justify-between items-center text-sm">
                <span class="text-gray-500 font-medium">Session Progress</span>
                <span id="progress-text" class="text-emerald-600 font-bold">0 Devices</span>
            </div>
            <div>
                <p class="text-xs uppercase tracking-widest text-gray-400 font-bold">Workflow Controller Status</p>
                <h2 id="status-text" class="text-base font-black text-emerald-600 mt-0.5">Ready for Next Box</h2>
            </div>

            <div id="dynamic-fields-container" class="space-y-4 pt-2 border-t border-gray-50">
            </div>

            <button id="btn-reset"
                class="w-full bg-red-50 hover:bg-red-100 text-red-600 py-3 rounded-xl text-sm font-medium transition mt-2">🛑
                Reset Current Entry Form</button>
        </div>

        <div id="recent-scans-box" class="bg-white p-5 rounded-2xl shadow-xs border border-gray-100 hidden">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Live Session Ingests</h3>
            <div id="history-list" class="divide-y divide-gray-50"></div>
        </div>
    </main>

</body>

</html>
