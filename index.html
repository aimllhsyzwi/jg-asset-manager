<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JG Asset Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <script>
        const GOOGLE_API_URL = "https://script.google.com/a/macros/jayagrocer.com/s/AKfycbxzY_r1hKDCbSU2J03r2A2xPV9TNn7D7xL1QxK7a3l9jM_a3q2Y/exec";

        const profiles = {
            "Sunmi V3": ["Barcode", "IMEI 1", "IMEI 2", "Serial Number", "SID"],
            "Android Phone": ["Barcode", "IMEI 1", "Serial Number"],
            "Newland Scanner": ["Barcode", "Serial Number"]
        };

        let currentProfileFields = [];
        let currentFieldIndex = 0;
        let currentDevicePayload = {};
        let sessionSuccessCount = 0;
        let codeReader = null;
        let isProcessingScan = false;

        function initiateWorkflow(profileName) {
            if (!profileName) return;
            currentProfileFields = profiles[profileName];
            currentFieldIndex = 0;
            currentDevicePayload = { "Model": profileName };

            buildMetadataGrid();
            document.getElementById("workflow-card").classList.remove("hidden");
            document.getElementById("recent-scans-box").classList.remove("hidden");

            advanceWorkflowStep();
        }

        function buildMetadataGrid() {
            const grid = document.getElementById("meta-display-grid");
            grid.innerHTML = "";
            grid.classList.remove("hidden");
            currentProfileFields.forEach((field, idx) => {
                grid.innerHTML += `
          <div class="flex justify-between p-2.5 rounded bg-white border border-gray-100 shadow-2xs font-mono text-xs items-center">
            <span class="text-gray-400 font-medium">${idx + 1}. ${field}:</span>
            <span id="meta-${field.replace(/\s+/g, '-')}" class="font-bold text-gray-500 bg-gray-50 px-2 py-1 rounded">Waiting...</span>
          </div>`;
            });
        }

        function advanceWorkflowStep() {
            if (currentFieldIndex < currentProfileFields.length) {
                const targetField = currentProfileFields[currentFieldIndex];
                document.getElementById("current-field-prompt").textContent = targetField;

                // Highlight active field in the checklist matrix box grid visually
                currentProfileFields.forEach((field, idx) => {
                    const targetId = `meta-${field.replace(/\s+/g, '-')}`;
                    const el = document.getElementById(targetId);
                    if (idx === currentFieldIndex) {
                        el.className = "font-bold text-amber-600 bg-amber-50 border border-amber-200 px-2 py-1 rounded animate-pulse";
                        el.textContent = "Scanning Now...";
                    }
                });

                isProcessingScan = false;
                if (!codeReader) startCameraEngine();
            } else {
                stopCameraEngine();
                submitToGoogleSheets();
            }
        }

        function processInput(value) {
            if (isProcessingScan) return;
            isProcessingScan = true;

            const activeField = currentProfileFields[currentFieldIndex];

            // Stop duplicate logging inside the same transaction execution bundle run
            if (Object.values(currentDevicePayload).includes(value)) {
                isProcessingScan = false;
                return;
            }

            currentDevicePayload[activeField] = value;

            // Update targeted row UI state indicators
            const targetId = `meta-${activeField.replace(/\s+/g, '-')}`;
            const element = document.getElementById(targetId);
            element.textContent = value;
            element.className = "font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 px-2 py-1 rounded break-all max-w-[60%] text-right";

            if (navigator.vibrate) navigator.vibrate(80);
            flashScannerViewfinder();

            currentFieldIndex++;
            // Cooldown timer window buffer so the operator can adjust focus to the next target barcode
            setTimeout(advanceWorkflowStep, 1000);
        }

        function startCameraEngine() {
            const videoContainer = document.getElementById("video-container");
            videoContainer.classList.remove("hidden");

            codeReader = new ZXing.BrowserMultiFormatReader();

            // Bypass configurations to spin up native rear camera lenses explicitly on GitHub Pages contexts
            codeReader.decodeFromConstraints({ video: { facingMode: "environment" } }, 'interactive-video', (result, err) => {
                if (result && !isProcessingScan) {
                    processInput(result.text.trim());
                }
            });
        }

        function stopCameraEngine() {
            if (codeReader) {
                codeReader.reset();
                codeReader = null;
                document.getElementById("video-container").classList.add("hidden");
            }
        }

        async function submitToGoogleSheets() {
            document.getElementById("current-field-prompt").textContent = "Saving to Google...";

            try {
                const response = await fetch(GOOGLE_API_URL, {
                    method: "POST",
                    body: JSON.stringify(currentDevicePayload)
                });
                const result = await response.json();

                if (result.success) {
                    sessionSuccessCount++;
                    document.getElementById("progress-text").textContent = `${sessionSuccessCount} Devices`;

                    const log = document.getElementById("history-list");
                    log.innerHTML = `<div class="py-2.5 text-gray-600 flex justify-between font-mono text-xs border-b border-gray-50"><span>✅ <b>${result.assetId}</b> [${currentDevicePayload["Model"]}]</span></div>` + log.innerHTML;

                    initiateWorkflow(document.getElementById("profile-selector").value);
                } else {
                    alert(result.message);
                    resetCurrentWorkflow();
                }
            } catch (err) {
                alert("Spreadsheet Connection Timeout.");
                resetCurrentWorkflow();
            }
        }

        function resetCurrentWorkflow() {
            initiateWorkflow(document.getElementById("profile-selector").value);
        }

        function flashScannerViewfinder() {
            const v = document.getElementById("interactive-video");
            v.classList.add("opacity-20", "brightness-150");
            setTimeout(() => v.classList.remove("opacity-20", "brightness-150"), 150);
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("profile-selector").addEventListener("change", (e) => initiateWorkflow(e.target.value));
            document.getElementById("btn-reset").addEventListener("click", resetCurrentWorkflow);
        });
    </script>

    <nav class="bg-emerald-600 text-white shadow-md p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg">JG Asset Manager</h1>
            <span class="text-xs bg-emerald-700 px-2 py-1 rounded">v6.0 - Auto-Stream</span>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <div class="bg-white p-5 rounded-2xl shadow-xs border border-gray-100">
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Select Device
                Profile</label>
            <select id="profile-selector"
                class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                <option value="" disabled selected>— Choose Profile —</option>
                <option value="Sunmi V3">Sunmi V3</option>
                <option value="Android Phone">Android Phone</option>
                <option value="Newland Scanner">Newland Scanner</option>
            </select>
        </div>

        <div id="workflow-card"
            class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 hidden text-center space-y-5">
            <div class="flex justify-between items-center text-sm">
                <span class="text-gray-500 font-medium">Session Progress</span>
                <span id="progress-text" class="text-emerald-600 font-bold">0 Devices</span>
            </div>

            <div class="bg-emerald-50/50 py-3 rounded-xl border border-emerald-100">
                <p class="text-[10px] uppercase tracking-widest text-emerald-600 font-bold">Aim Viewfinder At</p>
                <h2 id="current-field-prompt" class="text-2xl font-black text-emerald-700 mt-0.5">—</h2>
            </div>

            <div id="video-container"
                class="relative w-full aspect-video bg-black rounded-xl overflow-hidden hidden border-2 border-emerald-500/20 shadow-inner">
                <video id="interactive-video" class="w-full h-full object-cover transition duration-150"></video>
                <div
                    class="absolute inset-0 border-4 border-dashed border-emerald-400/60 m-6 rounded pointer-events-none animate-pulse">
                </div>
            </div>

            <div id="meta-display-grid" class="space-y-2 pt-2 border-t border-gray-100 hidden">
            </div>

            <button id="btn-reset"
                class="w-full bg-red-50 hover:bg-red-100 text-red-600 py-3 rounded-xl text-sm font-medium transition">🛑
                Reset Workflow</button>
        </div>

        <div id="recent-scans-box" class="bg-white p-5 rounded-2xl shadow-xs border border-gray-100 hidden">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Live Session Ingests</h3>
            <div id="history-list" class="divide-y divide-gray-50"></div>
        </div>
    </main>

</body>

</html>
